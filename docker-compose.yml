# Grafana LGTM showcase for a Spring Boot app.
#
#   app      -> Spring Boot sample (metrics + OTLP traces + Loki logs)
#   alloy    -> scrapes app metrics into Mimir; receives OTLP traces, tail-samples, forwards to Tempo
#   mimir    -> metrics store        (S3 backend -> MinIO)
#   loki     -> logs store           (S3 backend -> MinIO)
#   tempo    -> traces store         (S3 backend -> MinIO)
#   minio    -> S3-compatible object storage for all three
#   grafana  -> dashboards + datasources (provisioned)
#   loadgen  -> fires a mix of good/bad requests at the app
#
# Local dev:  docker compose up -d --build
# Swarm:      see README.md (build/push the app image first, then `docker stack deploy`)

x-minio-env: &minio-env
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}

services:
  # -------------------------------------------------------------------------
  # Object storage
  # -------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      <<: *minio-env
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data
    networks: [showcase]

  # One-shot: create the buckets Mimir/Loki/Tempo need, then exit.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      <<: *minio-env
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo 'waiting for minio...'; sleep 2;
        done
        mc mb --ignore-existing local/mimir-blocks local/mimir-ruler local/loki-data local/tempo-data
        echo 'buckets ready'
    networks: [showcase]

  # -------------------------------------------------------------------------
  # Metrics / Logs / Traces backends
  # -------------------------------------------------------------------------
  mimir:
    image: grafana/mimir:2.15.0
    command: ["-config.file=/etc/mimir/mimir.yml", "-config.expand-env=true"]
    environment:
      <<: *minio-env
    volumes:
      - ./observability/mimir/mimir.yml:/etc/mimir/mimir.yml:ro
      - mimir-data:/data
    ports:
      - "9009:9009"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    networks: [showcase]

  loki:
    image: grafana/loki:3.4.2
    command: ["-config.file=/etc/loki/loki.yml", "-config.expand-env=true"]
    environment:
      <<: *minio-env
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    networks: [showcase]

  tempo:
    image: grafana/tempo:2.7.1
    command: ["-config.file=/etc/tempo/tempo.yml", "-config.expand-env=true"]
    environment:
      <<: *minio-env
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo API / query
    depends_on:
      minio-init:
        condition: service_completed_successfully
    networks: [showcase]

  # -------------------------------------------------------------------------
  # Collector
  # -------------------------------------------------------------------------
  alloy:
    image: grafana/alloy:v1.7.5
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      # Read-only Docker socket: discover containers and tail their logs.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "12345:12345"   # Alloy UI
    depends_on:
      mimir:
        condition: service_started
      tempo:
        condition: service_started
    networks: [showcase]

  # -------------------------------------------------------------------------
  # Continuous profiling
  # -------------------------------------------------------------------------
  pyroscope:
    image: grafana/pyroscope:1.13.1
    # Loopback ring pinning — required on swarm (multi-interface tasks), harmless here.
    command:
      - -memberlist.bind-addr=127.0.0.1
      - -memberlist.advertise-addr=127.0.0.1
      - -ingester.lifecycler.addr=127.0.0.1
      - -distributor.ring.instance-addr=127.0.0.1
      - -query-frontend.instance-addr=127.0.0.1
      - -query-scheduler.ring.instance-addr=127.0.0.1
      - -store-gateway.sharding-ring.instance-addr=127.0.0.1
      - -compactor.ring.instance-addr=127.0.0.1
      - -overrides-exporter.ring.instance-addr=127.0.0.1
    ports:
      - "4040:4040"
    volumes:
      - pyroscope-data:/data
    networks: [showcase]

  # -------------------------------------------------------------------------
  # Grafana
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: dark
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
      GF_LOG_LEVEL: warn
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      mimir:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    networks: [showcase]

  # -------------------------------------------------------------------------
  # The application under observation
  # -------------------------------------------------------------------------
  app:
    build:
      context: ./app
    image: showcase-app:latest
    # `logging=true` opts this container in to Alloy's Docker log scraping.
    labels:
      logging: "true"
    environment:
      # prod profile -> structured ECS JSON on stdout (scraped by Alloy)
      SPRING_PROFILES_ACTIVE: prod
      OTLP_TRACING_ENDPOINT: http://alloy:4318/v1/traces
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0"
      # Pyroscope agent (baked into the image; only attaches when this is set)
      PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
      PYROSCOPE_APPLICATION_NAME: showcase
      PYROSCOPE_PROFILER_ALLOC: 512k
      PYROSCOPE_PROFILER_LOCK: 10ms
    ports:
      - "8080:8080"
    depends_on:
      alloy:
        condition: service_started
      pyroscope:
        condition: service_started
    networks: [showcase]

  # -------------------------------------------------------------------------
  # Load testing (Grafana k6)
  # -------------------------------------------------------------------------
  k6:
    image: grafana/k6:0.57.0
    command: ["run", "--quiet", "/scripts/load.js"]
    environment:
      TARGET: http://app:8080
      RATE: "3"
    volumes:
      - ./k6/load.js:/scripts/load.js:ro
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped
    networks: [showcase]

volumes:
  minio-data:
  mimir-data:
  loki-data:
  tempo-data:
  grafana-data:
  pyroscope-data:

networks:
  showcase:
    driver: bridge
