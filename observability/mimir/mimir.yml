# Mimir — single-binary (-target=all), TSDB blocks stored in MinIO (S3).
multitenancy_enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: info

# Shared S3 connection details; per-component buckets are set below.
common:
  storage:
    backend: s3
    s3:
      endpoint: minio:9000
      access_key_id: ${MINIO_ROOT_USER}
      secret_access_key: ${MINIO_ROOT_PASSWORD}
      insecure: true

blocks_storage:
  backend: s3
  s3:
    bucket_name: mimir-blocks
  tsdb:
    dir: /data/tsdb
  bucket_store:
    sync_dir: /data/tsdb-sync

ruler_storage:
  backend: s3
  s3:
    bucket_name: mimir-ruler

# Single-replica everything (dev / single-node friendly).
#
# instance_addr is pinned to loopback on every ring: on Docker Swarm, tasks have
# several interfaces (overlay + ingress when ports are published) and Mimir's
# address autodetection can advertise the wrong one, breaking the rings
# ("difficult time communicating among their own workers"). A monolithic Mimir
# only needs to reach itself, so loopback is always correct.
ingester:
  ring:
    replication_factor: 1
    instance_addr: 127.0.0.1

distributor:
  ring:
    instance_addr: 127.0.0.1

store_gateway:
  sharding_ring:
    replication_factor: 1
    instance_addr: 127.0.0.1

compactor:
  sharding_ring:
    instance_addr: 127.0.0.1

ruler:
  ring:
    instance_addr: 127.0.0.1

# The rings above default to memberlist for coordination; bind that to loopback too.
memberlist:
  bind_addr: [127.0.0.1]
  advertise_addr: 127.0.0.1

# Accept remote-write from Alloy and Tempo, keep exemplars for trace correlation,
# tolerate the slightly out-of-order samples that span metrics can produce.
limits:
  ingestion_rate: 100000
  ingestion_burst_size: 200000
  max_global_series_per_user: 0
  max_global_exemplars_per_user: 100000
  out_of_order_time_window: 10m
  native_histograms_ingestion_enabled: true

usage_stats:
  enabled: false
