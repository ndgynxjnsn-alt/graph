# Tempo — single-binary mode, traces stored in MinIO (S3).
stream_over_http_enabled: true

server:
  http_listen_port: 3200
  grpc_listen_port: 9095

# Tempo receives traces over OTLP (forwarded by Alloy after tail sampling).
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

# Pin the ring to loopback. On Docker Swarm, tasks have several interfaces
# (overlay + ingress when ports are published) and Tempo's address autodetection
# can pick the wrong one, breaking ring communication. Single-binary Tempo only
# needs to reach itself, so loopback + an in-memory ring is always correct.
ingester:
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 48h

storage:
  trace:
    backend: s3
    s3:
      endpoint: minio:9000
      bucket: tempo-data
      access_key: ${MINIO_ROOT_USER}
      secret_key: ${MINIO_ROOT_PASSWORD}
      insecure: true
      forcepathstyle: true
    wal:
      path: /var/tempo/wal

# Generate RED metrics + service graphs from spans and push them to Mimir.
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://mimir:9009/api/v1/push
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]

usage_report:
  reporting_enabled: false
