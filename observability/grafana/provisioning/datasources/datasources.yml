apiVersion: 1

datasources:
  # ---- Metrics (Mimir speaks the Prometheus query API under /prometheus) ----
  - name: Mimir
    uid: mimir
    type: prometheus
    access: proxy
    url: http://mimir:9009/prometheus
    isDefault: true
    jsonData:
      httpMethod: POST
      manageAlerts: false
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo

  # ---- Logs ----
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      # Turn "traceId=<id>" in a log line into a clickable link to the trace in Tempo.
      derivedFields:
        - name: TraceID
          matcherType: regex
          matcherRegex: 'traceId=(\w+)'
          url: '$${__value.raw}'
          datasourceUid: tempo

  # ---- Continuous profiling ----
  - name: Pyroscope
    uid: pyroscope
    type: grafana-pyroscope-datasource
    access: proxy
    url: http://pyroscope:4040

  # ---- Traces ----
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      # Jump from a span to the matching logs in Loki.
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        filterByTraceID: true
        tags:
          - key: service.name
            value: app
      # Jump from a span to request-rate metrics.
      tracesToMetrics:
        datasourceUid: mimir
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
      # Service graph is backed by the span metrics Tempo pushes into Mimir.
      serviceMap:
        datasourceUid: mimir
      nodeGraph:
        enabled: true
      streamingEnabled:
        search: true
