spring:
  application:
    name: showcase

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        # /actuator/prometheus is scraped by Alloy; the rest are handy for debugging
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  # Attach service.name etc. as resource attributes / common tags
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      # Emit histogram buckets so Grafana can compute latency percentiles/heatmaps server-side
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,400ms,800ms,1s,2s
  tracing:
    sampling:
      # Record 100% at the app; Alloy does tail-based sampling (keeps ALL errors + a slice of the rest)
      probability: 1.0
  otlp:
    tracing:
      # OTLP/HTTP endpoint of the Alloy collector (override with MANAGEMENT_OTLP_TRACING_ENDPOINT)
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

# Dev default: human-readable console. Spring Boot already appends the correlation
# fields ([service,traceId,spanId]) to the console pattern when tracing is on the
# classpath, so no custom logback is needed.

---
# Production profile (SPRING_PROFILES_ACTIVE=prod): emit structured ECS JSON to
# stdout, one object per line. Grafana Alloy scrapes these lines off the Docker
# log stream and ships them to Loki. MDC entries — including traceId / spanId from
# Micrometer Tracing — are included automatically.
spring:
  config:
    activate:
      on-profile: prod
  main:
    # The ASCII banner is printed raw (not through the logging system); turn it
    # off in prod so every stdout line is valid JSON.
    banner-mode: "off"
logging:
  structured:
    format:
      console: ecs
